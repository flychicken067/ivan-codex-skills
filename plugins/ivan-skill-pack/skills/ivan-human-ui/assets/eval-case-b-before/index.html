<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case B Before</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; }
      .hero { text-align: center; padding: 48px 24px; }
      .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; padding: 24px; }
      .card { border: 1px solid #d1d5db; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgb(0 0 0 / 18%); }
      .shot { width: 100%; border: 1px solid #9ca3af; border-radius: 16px; }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>Indigo analytics for every revenue stream</h1>
      <p>Emerald highlights + centered layout.</p>
    </header>
    <main class="cards">
      <section class="card">
        <h2>Forecasting</h2>
        <img class="shot" src="https://example.com/shot.png" alt="dashboard" />
      </section>
      <section class="card">
        <h2>Expenses</h2>
        <p>Generic template section.</p>
      </section>
    </main>
  </body>
</html>
